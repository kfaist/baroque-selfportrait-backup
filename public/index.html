<!-- deploy-v5-turn-servers -->
<!-- v5-TURN-servers-ice-restart -->
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baroque Mirror v4 - Diagnostic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0608; color: #fff; font-family: monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: rgba(20,15,18,0.9); border: 2px solid #d4af37; border-radius: 8px; padding: 15px; }
        h2 { color: #d4af37; margin-bottom: 15px; font-size: 1.2rem; }
        .video-box { position: relative; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-badge { position: absolute; top: 10px; left: 10px; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-badge.connected { background: #0f0; color: #000; }
        .status-badge.connecting { background: #ff0; color: #000; animation: blink 1s infinite; }
        .status-badge.disconnected { background: #f00; color: #fff; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn { width: 100%; padding: 15px; border: 2px solid #d4af37; background: linear-gradient(180deg, #722f37, #4a1f24); color: #d4af37; font-size: 1rem; cursor: pointer; border-radius: 8px; margin-bottom: 10px; }
        .btn:hover { background: #d4af37; color: #000; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn.stop { background: #8b0000; border-color: #ff6b6b; color: #ff6b6b; }
        #log { background: #000; padding: 10px; border-radius: 4px; height: 300px; overflow-y: auto; font-size: 0.75rem; line-height: 1.4; }
        .log-info { color: #88f; }
        .log-success { color: #0f0; }
        .log-error { color: #f00; }
        .log-warn { color: #ff0; }
        .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .metric { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; text-align: center; }
        .metric-value { font-size: 1.5rem; color: #d4af37; font-weight: bold; }
        .metric-label { font-size: 0.7rem; color: #888; }
        .stage-indicator { display: flex; gap: 5px; margin-bottom: 15px; }
        .stage { flex: 1; padding: 8px; text-align: center; font-size: 0.7rem; border-radius: 4px; background: #333; }
        .stage.active { background: #d4af37; color: #000; }
        .stage.complete { background: #0f0; color: #000; }
        .stage.error { background: #f00; color: #fff; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h2>📹 INPUT (Your Camera → WHIP → Daydream)</h2>
            <div class="video-box">
                <video id="local" autoplay muted playsinline></video>
                <div class="status-badge disconnected" id="inputStatus">NO CAMERA</div>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="framesSent">0</div>
                    <div class="metric-label">Frames Sent</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="bytesSent">0</div>
                    <div class="metric-label">KB Sent</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="iceState">-</div>
                    <div class="metric-label">ICE State</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="whipState">-</div>
                    <div class="metric-label">WHIP State</div>
                </div>
            </div>
            <button class="btn" id="startBtn" onclick="start()">▶ START DIAGNOSTIC SESSION</button>
            <button class="btn stop" id="stopBtn" onclick="stop()" style="display:none">■ STOP</button>
        </div>
        
        <div class="panel">
            <h2>🎨 OUTPUT (Livepeer HLS → Your Screen)</h2>
            <div class="video-box">
                <video id="output" autoplay playsinline></video>
                <div class="status-badge disconnected" id="outputStatus">NO STREAM</div>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="aiLive">❌</div>
                    <div class="metric-label">AI Processing</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="hlsState">-</div>
                    <div class="metric-label">HLS State</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="pollCount">0</div>
                    <div class="metric-label">Poll #</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="elapsed">0s</div>
                    <div class="metric-label">Elapsed</div>
                </div>
            </div>
            <div class="stage-indicator">
                <div class="stage" id="stage1">1. Camera</div>
                <div class="stage" id="stage2">2. Stream</div>
                <div class="stage" id="stage3">3. WHIP</div>
                <div class="stage" id="stage4">4. AI</div>
                <div class="stage" id="stage5">5. HLS</div>
            </div>
        </div>
    </div>
    
    <div class="panel" style="margin-top: 20px;">
        <h2>📋 DIAGNOSTIC LOG</h2>
        <div id="log"></div>
    </div>

<script>
const API_KEY = 'sk_wdNUnsKxxwH6v64BHMwHaWT39Mhwk5ZrqZzXDRmAXxxAqCgVGusff2Y8jxiBofuP';
const API_BASE = 'https://api.daydream.live/v1';
const PIPELINE_ID = 'pip_qpUgXycjWF6YMeSL';

let localStream, inputPC, streamId, playbackId, hls;
let pollTimer, statsTimer, elapsedTimer;
let startTime;

function log(msg, type = 'info') {
    const div = document.getElementById('log');
    const line = document.createElement('div');
    line.className = 'log-' + type;
    const time = new Date().toLocaleTimeString();
    line.textContent = `[${time}] ${msg}`;
    div.appendChild(line);
    div.scrollTop = div.scrollHeight;
    console.log(`[${type}] ${msg}`);
}

function setStage(num, status) {
    const el = document.getElementById('stage' + num);
    el.className = 'stage ' + status;
}

function updateMetric(id, value) {
    document.getElementById(id).textContent = value;
}

async function start() {
    document.getElementById('startBtn').disabled = true;
    startTime = Date.now();
    
    // Stage 1: Camera
    setStage(1, 'active');
    log('Requesting camera access...', 'info');
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 1280, height: 720, frameRate: 30 }, 
            audio: true 
        });
        document.getElementById('local').srcObject = localStream;
        document.getElementById('inputStatus').className = 'status-badge connected';
        document.getElementById('inputStatus').textContent = 'CAMERA OK';
        log(`Camera ready: ${localStream.getVideoTracks()[0].getSettings().width}x${localStream.getVideoTracks()[0].getSettings().height}`, 'success');
        setStage(1, 'complete');
    } catch (e) {
        log(`Camera error: ${e.message}`, 'error');
        setStage(1, 'error');
        document.getElementById('startBtn').disabled = false;
        return;
    }
    
    // Stage 2: Create Stream
    setStage(2, 'active');
    log('Creating Daydream stream...', 'info');
    try {
        const res = await fetch(`${API_BASE}/streams`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
            body: JSON.stringify({ pipeline_id: PIPELINE_ID })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        streamId = data.id;
        playbackId = data.output_playback_id;
        log(`Stream: ${streamId}`, 'success');
        log(`Playback ID: ${playbackId}`, 'info');
        log(`WHIP URL: ${data.whip_url}`, 'info');
        setStage(2, 'complete');
        
        // Stage 3: WHIP
        setStage(3, 'active');
        await connectWHIP(data.whip_url);
        
    } catch (e) {
        log(`Stream error: ${e.message}`, 'error');
        setStage(2, 'error');
        document.getElementById('startBtn').disabled = false;
        return;
    }
    
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    
    // Start stats monitoring
    statsTimer = setInterval(updateStats, 1000);
    elapsedTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        updateMetric('elapsed', elapsed + 's');
    }, 1000);
    
    // Set params after WHIP connected
    setTimeout(async () => {
        log('Setting AI parameters...', 'info');
        await setParams();
        
        // Stage 4 & 5: AI and HLS
        setStage(4, 'active');
        startPolling();
    }, 3000);
}

async function connectWHIP(whipUrl) {
    log('Creating RTCPeerConnection...', 'info');
    
    inputPC = new RTCPeerConnection({
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            // Free TURN servers for NAT traversal
            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
        ],
        iceCandidatePoolSize: 10
    });
    
    // ICE restart on disconnect
    let iceRestartAttempts = 0;
    const MAX_ICE_RESTARTS = 3;
    
    inputPC.oniceconnectionstatechange = () => {
        const state = inputPC.iceConnectionState;
        updateMetric('iceState', state.toUpperCase());
        log(`ICE state: ${state}`, state === 'connected' ? 'success' : 'info');
        
        if (state === 'connected') {
            document.getElementById('inputStatus').className = 'status-badge connected';
            document.getElementById('inputStatus').textContent = 'STREAMING';
            setStage(3, 'complete');
            iceRestartAttempts = 0; // Reset on successful connection
        } else if (state === 'checking') {
            document.getElementById('inputStatus').className = 'status-badge connecting';
            document.getElementById('inputStatus').textContent = 'CONNECTING...';
        } else if (state === 'disconnected') {
            document.getElementById('inputStatus').className = 'status-badge connecting';
            document.getElementById('inputStatus').textContent = 'RECONNECTING...';
            log('ICE disconnected - attempting restart...', 'warn');
            
            // Try ICE restart
            if (iceRestartAttempts < MAX_ICE_RESTARTS) {
                iceRestartAttempts++;
                log(`ICE restart attempt ${iceRestartAttempts}/${MAX_ICE_RESTARTS}`, 'info');
                setTimeout(() => {
                    if (inputPC && inputPC.iceConnectionState === 'disconnected') {
                        inputPC.restartIce();
                    }
                }, 2000);
            }
        } else if (state === 'failed') {
            document.getElementById('inputStatus').className = 'status-badge disconnected';
            document.getElementById('inputStatus').textContent = 'FAILED';
            setStage(3, 'error');
            log('ICE failed - connection cannot be established', 'error');
        }
    };
    
    inputPC.onicecandidate = (e) => {
        if (e.candidate) {
            log(`ICE candidate: ${e.candidate.type} ${e.candidate.protocol}`, 'info');
        }
    };
    
    // Add tracks
    localStream.getTracks().forEach(track => {
        log(`Adding track: ${track.kind}`, 'info');
        inputPC.addTrack(track, localStream);
    });
    
    // Create offer
    log('Creating SDP offer...', 'info');
    const offer = await inputPC.createOffer();
    await inputPC.setLocalDescription(offer);
    
    // Wait for ICE gathering
    log('Gathering ICE candidates...', 'info');
    updateMetric('whipState', 'GATHERING');
    await new Promise(resolve => {
        if (inputPC.iceGatheringState === 'complete') {
            resolve();
        } else {
            inputPC.onicegatheringstatechange = () => {
                log(`ICE gathering: ${inputPC.iceGatheringState}`, 'info');
                if (inputPC.iceGatheringState === 'complete') resolve();
            };
            setTimeout(resolve, 10000); // 10s timeout
        }
    });
    
    // Send to WHIP
    log('Sending offer to WHIP endpoint...', 'info');
    updateMetric('whipState', 'SENDING');
    const res = await fetch(whipUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: inputPC.localDescription.sdp
    });
    
    if (!res.ok) {
        const text = await res.text();
        throw new Error(`WHIP ${res.status}: ${text}`);
    }
    
    const answer = await res.text();
    log(`Got WHIP answer (${answer.length} bytes)`, 'success');
    updateMetric('whipState', 'CONNECTED');
    
    await inputPC.setRemoteDescription({ type: 'answer', sdp: answer });
    log('Remote description set', 'success');
}

async function updateStats() {
    if (!inputPC) return;
    
    try {
        const stats = await inputPC.getStats();
        stats.forEach(s => {
            if (s.type === 'outbound-rtp' && s.kind === 'video') {
                updateMetric('framesSent', s.framesSent || 0);
                updateMetric('bytesSent', Math.floor((s.bytesSent || 0) / 1024));
            }
        });
    } catch (e) {}
}

async function setParams() {
    const body = {
        model_id: "streamdiffusion",
        pipeline: "live-video-to-video",
        params: {
            model_id: "stabilityai/sd-turbo",
            prompt: "baroque oil painting, dramatic chiaroscuro, Rembrandt style, golden light, rich textures",
            negative_prompt: "blurry, low quality, modern, digital",
            num_inference_steps: 25,
            seed: 42
        }
    };
    
    try {
        await fetch(`${API_BASE}/streams/${streamId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
            body: JSON.stringify(body)
        });
        log('AI params set', 'success');
    } catch (e) {
        log(`Params error: ${e.message}`, 'warn');
    }
}

function startPolling() {
    let pollCount = 0;
    
    // Try HLS immediately
    const hlsUrl = `https://livepeercdn.studio/hls/${playbackId}/index.m3u8`;
    log(`HLS URL: ${hlsUrl}`, 'info');
    setTimeout(() => connectHLS(hlsUrl), 2000);
    
    const poll = async () => {
        pollCount++;
        updateMetric('pollCount', pollCount);
        
        try {
            const res = await fetch(`https://livepeer.studio/api/playback/${playbackId}`);
            const data = await res.json();
            
            if (data.meta?.live === 1) {
                updateMetric('aiLive', '✅');
                log('AI is processing! Output should appear soon.', 'success');
                setStage(4, 'complete');
            } else {
                updateMetric('aiLive', '❌');
                if (pollCount % 5 === 0) {
                    log(`Poll ${pollCount}: AI not yet processing (live=${data.meta?.live})`, 'info');
                }
            }
            
            if (data.meta?.live !== 1 && pollCount < 120) {
                pollTimer = setTimeout(poll, 2000);
            }
        } catch (e) {
            log(`Poll error: ${e.message}`, 'warn');
            if (pollCount < 120) pollTimer = setTimeout(poll, 3000);
        }
    };
    
    pollTimer = setTimeout(poll, 3000);
}

function connectHLS(url) {
    log('Connecting to HLS...', 'info');
    setStage(5, 'active');
    updateMetric('hlsState', 'CONNECTING');
    
    const video = document.getElementById('output');
    
    if (Hls.isSupported()) {
        if (hls) hls.destroy();
        
        hls = new Hls({
            lowLatencyMode: true,
            liveSyncDuration: 0.5,
            liveMaxLatencyDuration: 2,
            maxBufferLength: 2,
            manifestLoadingTimeOut: 30000,
            manifestLoadingMaxRetry: 10,
            manifestLoadingRetryDelay: 2000,
            levelLoadingTimeOut: 30000,
            levelLoadingMaxRetry: 10,
            fragLoadingTimeOut: 30000,
            fragLoadingMaxRetry: 10
        });
        
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            log('HLS manifest loaded!', 'success');
            updateMetric('hlsState', 'PLAYING');
            document.getElementById('outputStatus').className = 'status-badge connected';
            document.getElementById('outputStatus').textContent = 'PLAYING';
            setStage(5, 'complete');
            video.play().catch(() => { video.muted = true; video.play(); });
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.details === 'manifestLoadError') {
                log(`HLS manifest not ready (retrying): ${data.response?.code || 'unknown'}`, 'warn');
                updateMetric('hlsState', 'WAITING');
            } else if (data.fatal) {
                log(`HLS fatal error: ${data.type} - ${data.details}`, 'error');
                updateMetric('hlsState', 'ERROR');
                setStage(5, 'error');
            } else {
                log(`HLS error: ${data.details}`, 'warn');
            }
        });
        
        hls.on(Hls.Events.FRAG_LOADED, () => {
            document.getElementById('outputStatus').className = 'status-badge connected';
            document.getElementById('outputStatus').textContent = 'RECEIVING';
        });
    }
}

function stop() {
    if (pollTimer) clearTimeout(pollTimer);
    if (statsTimer) clearInterval(statsTimer);
    if (elapsedTimer) clearInterval(elapsedTimer);
    if (inputPC) { inputPC.close(); inputPC = null; }
    if (hls) { hls.destroy(); hls = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    
    document.getElementById('local').srcObject = null;
    document.getElementById('output').src = '';
    document.getElementById('inputStatus').className = 'status-badge disconnected';
    document.getElementById('inputStatus').textContent = 'STOPPED';
    document.getElementById('outputStatus').className = 'status-badge disconnected';
    document.getElementById('outputStatus').textContent = 'STOPPED';
    
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').style.display = 'none';
    
    for (let i = 1; i <= 5; i++) setStage(i, '');
    
    log('Session stopped', 'info');
}
</script>
</body>
</html>
