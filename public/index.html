<!-- deploy-v7-abstract-prompts -->
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baroque Mirror - Abstract Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0608; color: #fff; font-family: 'Georgia', serif; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: rgba(20,15,18,0.9); border: 2px solid #d4af37; border-radius: 8px; padding: 15px; }
        h2 { color: #d4af37; margin-bottom: 15px; font-size: 1.2rem; }
        .video-box { position: relative; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-badge { position: absolute; top: 10px; left: 10px; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-badge.connected { background: #0f0; color: #000; }
        .status-badge.connecting { background: #ff0; color: #000; animation: blink 1s infinite; }
        .status-badge.disconnected { background: #f00; color: #fff; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn { width: 100%; padding: 15px; border: 2px solid #d4af37; background: linear-gradient(180deg, #722f37, #4a1f24); color: #d4af37; font-size: 1rem; cursor: pointer; border-radius: 8px; margin-bottom: 10px; }
        .btn:hover { background: #d4af37; color: #000; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn.stop { background: #8b0000; border-color: #ff6b6b; color: #ff6b6b; }
        #log { background: #000; padding: 10px; border-radius: 4px; height: 200px; overflow-y: auto; font-size: 0.7rem; line-height: 1.4; font-family: monospace; }
        .log-info { color: #88f; }
        .log-success { color: #0f0; }
        .log-error { color: #f00; }
        .log-warn { color: #ff0; }
        
        /* Prompt Controls */
        .prompt-section { margin-bottom: 15px; }
        .prompt-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .shuffle-btn { width: 60px; height: 60px; border: 2px solid #d4af37; background: rgba(20,15,18,0.9); color: #d4af37; cursor: pointer; border-radius: 8px; font-size: 2rem; transition: all 0.3s; flex-shrink: 0; }
        .shuffle-btn:hover { background: rgba(212,175,55,0.3); transform: scale(1.1) rotate(15deg); }
        .prompt-display { flex: 1; padding: 12px; border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.5); color: #f4e4ba; border-radius: 8px; font-size: 0.9rem; font-style: italic; min-height: 60px; display: flex; align-items: center; }
        
        /* Category buttons */
        .category-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .cat-btn { padding: 8px 16px; border: 1px solid rgba(212,175,55,0.5); background: rgba(20,15,18,0.8); color: #d4af37; cursor: pointer; border-radius: 20px; font-size: 0.8rem; transition: all 0.2s; }
        .cat-btn:hover, .cat-btn.active { background: #d4af37; color: #000; }
        
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .metric { background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px; text-align: center; }
        .metric-value { font-size: 1.2rem; color: #d4af37; font-weight: bold; }
        .metric-label { font-size: 0.65rem; color: #888; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h2>📹 INPUT</h2>
            <div class="video-box">
                <video id="local" autoplay muted playsinline></video>
                <div class="status-badge disconnected" id="inputStatus">NO CAMERA</div>
            </div>
            
            <div class="prompt-section">
                <h2>🎲 PROMPT</h2>
                <div class="prompt-row">
                    <button class="shuffle-btn" onclick="shufflePrompt()">🎲</button>
                    <div class="prompt-display" id="promptDisplay">Click shuffle for magic!</div>
                </div>
                <div class="category-btns">
                    <button class="cat-btn active" data-cat="all">All</button>
                    <button class="cat-btn" data-cat="candy">🍬 Candy</button>
                    <button class="cat-btn" data-cat="baroque">🏛️ Baroque</button>
                    <button class="cat-btn" data-cat="rococo">🌸 Rococo</button>
                </div>
            </div>
            
            <button class="btn" id="startBtn" onclick="start()">▶ START SESSION</button>
            <button class="btn stop" id="stopBtn" onclick="stop()" style="display:none">■ STOP</button>
        </div>
        
        <div class="panel">
            <h2>🎨 OUTPUT</h2>
            <div class="video-box">
                <video id="output" autoplay playsinline></video>
                <div class="status-badge disconnected" id="outputStatus">NO STREAM</div>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="aiLive">❌</div>
                    <div class="metric-label">AI Live</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="pollCount">0</div>
                    <div class="metric-label">Poll #</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="elapsed">0s</div>
                    <div class="metric-label">Time</div>
                </div>
            </div>
            <div id="log"></div>
        </div>
    </div>

<script>
const API_KEY = 'sk_wdNUnsKxxwH6v64BHMwHaWT39Mhwk5ZrqZzXDRmAXxxAqCgVGusff2Y8jxiBofuP';
const API_BASE = 'https://api.daydream.live/v1';
const PIPELINE_ID = 'pip_SDXL-turbo-faceid';

// ALL THE FUN PROMPTS!
const prompts = {
    candy: [
        "whipped cream kaleidoscope rainbow",
        "marshmallow gumball",
        "soda pop and candy kaleidoscope",
        "tumbling inside of a rainbow kaleidoscope full of dichroic glass confetti and iridescent sequins",
        "dichroic glass confetti and iridescent sequins",
        "holographic soda pop fizz and candy wrapper kaleidoscope",
        "glitter bomb explosion inside a snow globe",
        "neon electric cotton candy clouds",
        "bubble wrap popping in slow motion with rainbow light",
        "gummy avalanche in crystal cave",
        "disco ball fragments floating in honey",
        "sprinkles tornado inside a cupcake",
        "jelly bean waterfall over chrome sculpture",
        "soap bubble cathedral with stained glass reflections"
    ],
    baroque: [
        "baroque acanthus scroll, luminous mechanical cells pulsing with bioluminescence",
        "rococo seashell motif, fibonacci spiral in mother of pearl and gold leaf",
        "baroque cartouche, living cells dividing within ornate gilded frame",
        "gilded baroque frame containing swirling galaxy of tiny stars",
        "ornate rococo mirror reflecting infinite recursive golden frames",
        "baroque ceiling fresco, trompe l'oeil clouds with bioluminescent edges",
        "gilded acanthus leaves unfurling in time-lapse, gold and green",
        "baroque pearl drop earring, lustrous sphere in golden filigree",
        "ornate snuff box enamel, miniature painting in jeweled frame",
        "gilded book spine details, leather and gold tooling patterns",
        "painterly brushstrokes, thick impasto, iridescent glaze, rainbow kaleidoscope icing world, high saturation, neon accents, prismatic, electric cyan, magenta, chartreuse, dichroic glass, iridescent pastels, pearlescent haze, watercolor bloom"
    ],
    rococo: [
        "pastel cotton candy clouds, soft pink and powder blue swirls, delicate pearlescent foam, dreamy soft focus, romantic haze, ornamental flourishes dissolving into light",
        "rococo frivolity expressed through airy pastel tones",
        "romantic rococo atmosphere with soft diffused light",
        "swirling composition echoing rococo decorative forms",
        "rococo ornament dissolving into decorative abstraction",
        "exuberant rococo scrollwork accenting the background",
        "decorative pastel motifs swirling around the figure",
        "painterly rococo extravagance with intricate details"
    ]
};

let currentCategory = 'all';
let currentPrompt = "whipped cream kaleidoscope rainbow";
let localStream, inputPC, streamId, playbackId, hls;
let pollTimer, statsTimer, elapsedTimer, startTime;

function log(msg, type = 'info') {
    const div = document.getElementById('log');
    const line = document.createElement('div');
    line.className = 'log-' + type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    div.appendChild(line);
    div.scrollTop = div.scrollHeight;
}

function shufflePrompt() {
    let pool;
    if (currentCategory === 'all') {
        pool = [...prompts.candy, ...prompts.baroque, ...prompts.rococo];
    } else {
        pool = prompts[currentCategory];
    }
    currentPrompt = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('promptDisplay').textContent = currentPrompt;
    log(`Prompt: ${currentPrompt.slice(0, 50)}...`, 'info');
    if (streamId) setParams();
}

// Category button handlers
document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.cat;
        shufflePrompt();
    };
});

function updateMetric(id, value) {
    document.getElementById(id).textContent = value;
}

async function start() {
    document.getElementById('startBtn').disabled = true;
    startTime = Date.now();
    
    log('Requesting camera...', 'info');
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: true });
        document.getElementById('local').srcObject = localStream;
        document.getElementById('inputStatus').className = 'status-badge connected';
        document.getElementById('inputStatus').textContent = 'CAMERA OK';
        log('Camera ready', 'success');
    } catch (e) {
        log(`Camera error: ${e.message}`, 'error');
        document.getElementById('startBtn').disabled = false;
        return;
    }
    
    log('Creating stream...', 'info');
    try {
        const res = await fetch(`${API_BASE}/streams`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
            body: JSON.stringify({ pipeline_id: PIPELINE_ID })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        streamId = data.id;
        playbackId = data.output_playback_id;
        log(`Stream: ${streamId}`, 'success');
        
        await connectWHIP(data.whip_url);
    } catch (e) {
        log(`Stream error: ${e.message}`, 'error');
        document.getElementById('startBtn').disabled = false;
        return;
    }
    
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    
    elapsedTimer = setInterval(() => {
        updateMetric('elapsed', Math.floor((Date.now() - startTime) / 1000) + 's');
    }, 1000);
    
    setTimeout(async () => {
        log('Setting params...', 'info');
        await setParams();
        startPolling();
    }, 3000);
}

async function connectWHIP(whipUrl) {
    inputPC = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });
    
    inputPC.oniceconnectionstatechange = () => {
        const state = inputPC.iceConnectionState;
        if (state === 'connected') {
            document.getElementById('inputStatus').textContent = 'STREAMING';
            log('WHIP connected', 'success');
        }
    };
    
    localStream.getTracks().forEach(track => inputPC.addTrack(track, localStream));
    
    const offer = await inputPC.createOffer();
    await inputPC.setLocalDescription(offer);
    
    await new Promise(r => {
        if (inputPC.iceGatheringState === 'complete') r();
        else inputPC.onicegatheringstatechange = () => { if (inputPC.iceGatheringState === 'complete') r(); };
        setTimeout(r, 10000);
    });
    
    const res = await fetch(whipUrl, { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: inputPC.localDescription.sdp });
    if (!res.ok) throw new Error(`WHIP ${res.status}`);
    await inputPC.setRemoteDescription({ type: 'answer', sdp: await res.text() });
}

async function setParams() {
    // Abstract mode - high delta for detailed output, prompts for style
    const body = {
        model_id: "streamdiffusion",
        pipeline: "live-video-to-video",
        params: {
            model_id: "stabilityai/sdxl-turbo",
            prompt: currentPrompt + ", painterly brushstrokes, thick impasto, iridescent glaze, high saturation, prismatic, pearlescent haze",
            negative_prompt: "text, letters, words, ugly, blurry, low quality",
            num_inference_steps: 4,
            guidance_scale: 1.5,
            delta: 0.85,
            seed: Math.floor(Math.random() * 10000)
        }
    };
    
    try {
        const res = await fetch(`${API_BASE}/streams/${streamId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
            body: JSON.stringify(body)
        });
        if (res.ok) log('Params set!', 'success');
        else log(`Params failed: ${res.status}`, 'warn');
    } catch (e) {
        log(`Params error: ${e.message}`, 'warn');
    }
}

function startPolling() {
    let pollCount = 0;
    let hlsConnected = false;
    
    const poll = async () => {
        pollCount++;
        updateMetric('pollCount', pollCount);
        
        try {
            const res = await fetch(`https://livepeer.studio/api/playback/${playbackId}`);
            const data = await res.json();
            const isLive = data.meta?.live === 1;
            
            updateMetric('aiLive', isLive ? '✅' : '❌');
            
            if (isLive && !hlsConnected) {
                hlsConnected = true;
                log('AI live! Connecting HLS...', 'success');
                setTimeout(() => {
                    const hlsUrl = `https://livepeercdn.studio/hls/${playbackId}/index.m3u8`;
                    connectHLS(hlsUrl);
                }, 3000);
            }
            
            if (pollCount < 180) pollTimer = setTimeout(poll, isLive ? 5000 : 2000);
        } catch (e) {
            if (pollCount < 180) pollTimer = setTimeout(poll, 3000);
        }
    };
    
    pollTimer = setTimeout(poll, 2000);
}

function connectHLS(url) {
    const video = document.getElementById('output');
    if (hls) hls.destroy();
    
    hls = new Hls({ lowLatencyMode: true, liveSyncDuration: 0.5, liveMaxLatencyDuration: 2 });
    hls.loadSource(url);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        log('HLS playing!', 'success');
        document.getElementById('outputStatus').className = 'status-badge connected';
        document.getElementById('outputStatus').textContent = 'PLAYING';
        video.play().catch(() => { video.muted = true; video.play(); });
    });
    
    hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.details === 'manifestLoadError') {
            setTimeout(() => hls.loadSource(url), 3000);
        }
    });
}

function stop() {
    if (pollTimer) clearTimeout(pollTimer);
    if (elapsedTimer) clearInterval(elapsedTimer);
    if (inputPC) { inputPC.close(); inputPC = null; }
    if (hls) { hls.destroy(); hls = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    
    document.getElementById('local').srcObject = null;
    document.getElementById('output').src = '';
    document.getElementById('inputStatus').className = 'status-badge disconnected';
    document.getElementById('inputStatus').textContent = 'STOPPED';
    document.getElementById('outputStatus').className = 'status-badge disconnected';
    document.getElementById('outputStatus').textContent = 'STOPPED';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').style.display = 'none';
    streamId = null;
    
    log('Stopped', 'info');
}

// Shuffle on load
shufflePrompt();
</script>
</body>
</html>
